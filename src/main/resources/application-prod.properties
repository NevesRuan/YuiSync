#PROD profile - MySQL
#remember to create de yuisync database before start on prod
spring.config.import=optional:file:.env[.properties]

# YouTube OAuth2 credentials (set YOUTUBE_CLIENT_ID and YOUTUBE_CLIENT_SECRET in .env)
youtube.oauth2.client-id=${YOUTUBE_CLIENT_ID}
youtube.oauth2.client-secret=${YOUTUBE_CLIENT_SECRET}

# Database credentials (set DB_USERNAME and DB_PASSWORD in .env)
spring.datasource.url=jdbc:mysql://localhost:3306/yuisync?useTimezone=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false