spring.application.name=YuiSync

# YuiSync configs
yuisync.download.path=./downloads

# YouTube OAuth2 credentials
# Get these from Google Cloud Console > APIs & Services > Credentials
youtube.oauth2.client-id=${YOUTUBE_CLIENT_ID}
youtube.oauth2.client-secret=${YOUTUBE_CLIENT_SECRET}

# log
logging.level.com.yuisync=DEBUG

#profile dev or prod - both of them working
spring.profiles.active=prod